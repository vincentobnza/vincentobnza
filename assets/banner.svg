<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 320" width="1200" height="320" fill="none" role="img" aria-label="Vincent Obenza — Software Developer">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="320" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0b1120"/>
      <stop offset="1" stop-color="#151f38"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#22d3ee"/>
      <stop offset="0.5" stop-color="#3b82f6"/>
      <stop offset="1" stop-color="#8b5cf6"/>
    </linearGradient>
    <linearGradient id="name" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#cbd5e1"/>
    </linearGradient>
    <pattern id="grid" width="34" height="34" patternUnits="userSpaceOnUse">
      <path d="M34 0H0V34" fill="none" stroke="#ffffff" stroke-opacity="0.03" stroke-width="1"/>
    </pattern>
  </defs>

  <!-- backdrop -->
  <rect width="1200" height="320" rx="18" fill="url(#bg)"/>
  <rect width="1200" height="320" rx="18" fill="url(#grid)"/>

  <!-- ambient glow -->
  <circle cx="1040" cy="90" r="230" fill="#3b82f6" fill-opacity="0.10"/>
  <circle cx="1140" cy="260" r="180" fill="#8b5cf6" fill-opacity="0.08"/>

  <!-- left content -->
  <rect x="80" y="86" width="56" height="6" rx="3" fill="url(#accent)"/>
  <text x="78" y="168" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="66" font-weight="700" fill="url(#name)">Vincent Obenza</text>
  <text x="82" y="212" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="25" font-weight="600" fill="#93c5fd">Software Developer</text>
  <text x="82" y="252" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="17" fill="#8391a8">Frontend-focused, full-stack capable · Web &amp; mobile products, end to end</text>

  <!-- right: browser / UI motif -->
  <g opacity="0.9">
    <rect x="872" y="70" width="248" height="168" rx="14" fill="#0f172a" stroke="#334155" stroke-width="1.5"/>
    <rect x="872" y="70" width="248" height="34" rx="14" fill="#1e293b"/>
    <rect x="872" y="92" width="248" height="12" fill="#1e293b"/>
    <circle cx="892" cy="87" r="4.5" fill="#f87171"/>
    <circle cx="908" cy="87" r="4.5" fill="#fbbf24"/>
    <circle cx="924" cy="87" r="4.5" fill="#34d399"/>
    <rect x="892" y="124" width="70" height="70" rx="10" fill="url(#accent)" fill-opacity="0.85"/>
    <rect x="978" y="126" width="122" height="11" rx="5.5" fill="#475569"/>
    <rect x="978" y="147" width="98" height="11" rx="5.5" fill="#334155"/>
    <rect x="978" y="168" width="122" height="11" rx="5.5" fill="#334155"/>
    <rect x="892" y="206" width="208" height="14" rx="7" fill="#1e293b"/>
  </g>
</svg>
